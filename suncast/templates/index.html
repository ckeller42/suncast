<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>suncast</title>
  <link rel="stylesheet" href="/static/vendor/leaflet/leaflet.css" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <h1>suncast</h1>
    <nav><a href="/">Forecast</a><a href="/history">History</a></nav>
  </header>
  <main>
    <div id="map"></div>
    <p class="summary-line">
      target: <span id="target-lat">–</span>, <span id="target-lon">–</span>
    </p>

    <form id="panel-form" class="card">
      <h3>Panel config</h3>
      <div class="form-grid">
        <label>panel Wp <input name="panel_wp" type="number" step="1" required /></label>
        <label>tilt (deg) <input name="tilt_deg" type="number" step="0.1" required /></label>
        <label>azimuth (deg) <input name="azimuth_deg" type="number" step="0.1" required /></label>
        <label>charger limit (W) <input name="charger_limit_w" type="number" step="1" required /></label>
        <label>damping <input name="damping" type="number" step="0.01" required /></label>
      </div>
      <div class="btn-row">
        <button type="submit">Save</button>
      </div>
    </form>

    <div class="card">
      <label>days
        <select id="days">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3" selected>3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="6">6</option>
        </select>
      </label>
      <div class="btn-row">
        <button type="button" class="secondary" id="use-location">Use current location</button>
        <button type="button" id="forecast-btn">Forecast here</button>
      </div>
    </div>

    <div id="status"></div>
    <div id="results"></div>
  </main>

  <script src="/static/vendor/leaflet/leaflet.js"></script>
  <script src="/static/app.js"></script>
  <script>
    initMap();
  </script>
</body>
</html>
