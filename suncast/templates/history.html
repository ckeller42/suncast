<html lang="en">

  <title>suncast · history</title>

<body>
  <header>
    <h1>suncast</h1>

    <div id="status"></div>
    <p class="note">Ratios compare <em>unthrottled (bulk) charge hours</em> only — with a full battery the MPPT throttles, so absorbed energy says nothing about panel potential.</p>

    <div id="bars" class="card"></div>
    <div class="card">
      <table>
        <thead>
          <tr><th>day</th><th>forecast</th><th>actual</th><th>ratio</th></tr>
        </thead>
        <tbody id="history-body"></tbody>
      </table>
    </div>
  </main>

    loadHistory();
  </script>
